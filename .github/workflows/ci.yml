name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run lint
        run: ruff check .

      - name: Run mock ping smoke check
        run: |
          output=$(python -m permanet_agent.main --mock --message "@permanet ping")
          test "$output" = "pong"

      - name: Run unsummoned public chatter smoke check
        run: |
          output=$(python -m permanet_agent.main --mock --message "hello mesh")
          test -z "$output"
