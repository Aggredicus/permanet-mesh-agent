name: Bug report
description: Report broken behavior or a regression.
title: "[Bug]: "
labels: ["triage"]
body:
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What is happening now?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, branch, commit, Meshtastic hardware if relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      render: shell
    validations:
      required: false
  - type: dropdown
    id: risk-level
    attributes:
      label: Risk level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: checkboxes
    id: safety-impact
    attributes:
      label: PermaNet safety impact
      options:
        - label: Affects public mesh behavior.
        - label: Affects live radio behavior.
        - label: Affects response length or multi-packet output.
        - label: Affects private channels or node identity.
        - label: Involves secrets, PSKs, API keys, or private client data.
        - label: Preserves mock-first before hardware.
  - type: textarea
    id: workaround
    attributes:
      label: Known workaround
    validations:
      required: false
  - type: textarea
    id: validation-plan
    attributes:
      label: Validation plan
      placeholder: How should the fix be tested?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
